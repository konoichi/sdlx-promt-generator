<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Leitfaden — SDXL Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0e0e12;
      --surface:    #16161e;
      --surface2:   #1e1e28;
      --border:     #252530;
      --border-mid: #3a3a46;
      --ink:        #e8e8f0;
      --muted:      #888899;
      --hint:       #555568;
      --accent:     #4ade80;
      --accent-dim: rgba(74,222,128,.1);
      --display:    'Inter', sans-serif;
      --mono:       'JetBrains Mono', monospace;
      --sidebar-w:  280px;
      --header-h:   48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--display);
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    .guide-header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.5rem;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-family: var(--mono);
      transition: color .15s;
    }
    .back-btn:hover { color: var(--accent); }
    .guide-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .guide-header-version {
      font-size: 11px;
      color: var(--hint);
      font-family: var(--mono);
      margin-left: auto;
    }

    /* ── Layout ─────────────────────────────────── */
    .guide-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar / TOC ──────────────────────────── */
    .guide-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.25rem 0;
      background: var(--surface);
    }
    .guide-sidebar::-webkit-scrollbar { width: 4px; }
    .guide-sidebar::-webkit-scrollbar-track { background: transparent; }
    .guide-sidebar::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .toc-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--hint);
      padding: 0 1.25rem 0.75rem;
    }

    /* TOC generated by python-markdown */
    .toc ul { list-style: none; padding: 0; }
    .toc li { padding: 0; }
    .toc > ul > li > a {
      display: block;
      padding: 5px 1.25rem;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s, background .15s;
      border-left: 2px solid transparent;
    }
    .toc > ul > li > a:hover {
      color: var(--ink);
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }
    .toc > ul > li > ul > li > a {
      display: block;
      padding: 3px 1.25rem 3px 2rem;
      font-size: 11px;
      color: var(--hint);
      text-decoration: none;
      transition: color .15s;
      border-left: 2px solid transparent;
    }
    .toc > ul > li > ul > li > a:hover {
      color: var(--muted);
      background: var(--accent-dim);
      border-left-color: var(--border-mid);
    }

    /* ── Content area ───────────────────────────── */
    .guide-content {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem 3rem;
    }
    .guide-content::-webkit-scrollbar { width: 6px; }
    .guide-content::-webkit-scrollbar-track { background: transparent; }
    .guide-content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    .guide-content-inner {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Markdown typography ────────────────────── */
    .md h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--ink);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .md h2 {
      font-size: 19px;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      color: var(--ink);
      scroll-margin-top: 1rem;
    }
    .md h2::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 1em;
      background: var(--accent);
      border-radius: 2px;
      margin-right: 10px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .md h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 1.75rem 0 0.75rem;
      color: var(--ink);
      scroll-margin-top: 1rem;
    }
    .md h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 1.25rem 0 0.5rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .md p {
      font-size: 14px;
      line-height: 1.8;
      color: var(--ink);
      margin-bottom: 1rem;
    }
    .md strong { font-weight: 600; color: var(--ink); }
    .md em { font-style: italic; color: var(--muted); }

    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }

    .md ul, .md ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .md li {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 0.25rem;
    }

    .md code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .md pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--ink);
      font-size: 12px;
      line-height: 1.7;
    }

    .md blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-dim);
      padding: 0.75rem 1rem;
      border-radius: 0 6px 6px 0;
      margin-bottom: 1rem;
    }
    .md blockquote p { margin: 0; color: var(--ink); font-size: 13px; }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Tables */
    .md table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 13px;
    }
    .md th {
      background: var(--surface2);
      border: 1px solid var(--border-mid);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .md td {
      border: 1px solid var(--border);
      padding: 7px 12px;
      vertical-align: top;
      line-height: 1.5;
    }
    .md tr:nth-child(even) td { background: var(--surface); }
    .md tr:hover td { background: var(--accent-dim); }
  </style>
</head>
<body>

<div class="guide-header">
  <a href="/" class="back-btn">← App</a>
  <span class="guide-header-title">Stable Diffusion Leitfaden</span>
  <span class="guide-header-version">v{{ version }} · {{ stand }}</span>
</div>

<div class="guide-layout">

  <nav class="guide-sidebar">
    <div class="toc-label">Inhalt</div>
    <div class="toc">{{ toc|safe }}</div>
  </nav>

  <main class="guide-content">
    <div class="guide-content-inner md">
      {{ content|safe }}
    </div>
  </main>

</div>

<script>
  // Aktiven TOC-Link beim Scrollen hervorheben
  const headings = document.querySelectorAll('.md h2, .md h3');
  const tocLinks = document.querySelectorAll('.toc a');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(l => l.style.color = '');
        const active = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
        if (active) active.style.color = 'var(--accent)';
      }
    });
  }, { rootMargin: '-10% 0px -85% 0px' });

  headings.forEach(h => observer.observe(h));
</script>

</body>
</html>
