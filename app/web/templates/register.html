<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - SDXL Prompt App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1115;
            --surface: #1a1d23;
            --border: #2d3139;
            --ink: #e2e4e9;
            --muted: #9ba1b0;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; text-align: center; }
        p.subtitle { color: var(--muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        
        .field { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--muted); }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--ink);
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        .btn:hover { background: var(--accent-hover); }
        
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        
        .flash {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Konto erstellen</h1>
        <p class="subtitle">Starte jetzt mit deiner SaaS Prompt-Experience.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/register" method="post">
            <div class="field">
                <label>Benutzername</label>
                <input type="text" name="username" required autofocus placeholder="z.B. PromptMaster">
            </div>
            <div class="field">
                <label>Email Adresse</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="field">
                <label>Passwort wählen</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Registrieren</button>
        </form>
        
        <div class="footer">
            Bereits ein Konto? <a href="/login">Einloggen</a>
        </div>
    </div>
</body>
</html>
