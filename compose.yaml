services:
  app:
    build:
      context: .
    image: sdxl-prompt-app:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DATA_DIR: /app/data
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - hermes
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  hermes:
    external: true
    name: hermes-agent_hermes-net
